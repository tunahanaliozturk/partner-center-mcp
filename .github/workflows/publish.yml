name: Publish

# Release flow: bump the version, then `git tag vX.Y.Z && git push origin vX.Y.Z`.
# Publishes the Node package to npm (OIDC Trusted Publishing) + the official MCP
# Registry (GitHub OIDC), and the .NET package to NuGet (if NUGET_API_KEY is set).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for both npm Trusted Publishing and the MCP Registry
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Use latest npm (required for OIDC Trusted Publishing) and print version
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Sync version from tag into package.json and server.json
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Publish to npm (OIDC Trusted Publishing)
        run: npm publish --access public

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish

  publish-dotnet:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build, test, and pack (version from tag)
        working-directory: dotnet
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version_detail.version = $v | .packages[0].version = $v' PartnerCenterMcp/.mcp/server.json > s.tmp && mv s.tmp PartnerCenterMcp/.mcp/server.json
          dotnet test PartnerCenterMcp.Tests -c Release
          dotnet pack PartnerCenterMcp -c Release -p:Version="$VERSION" -o ./artifacts

      - name: Push to NuGet (only if NUGET_API_KEY is set)
        if: ${{ env.NUGET_API_KEY != '' }}
        working-directory: dotnet
        run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
